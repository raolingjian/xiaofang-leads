<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>线索管理后台 - 消防培训</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
body{background:#f0f2f5;color:#333}
.header{background:linear-gradient(135deg,#1a3a6b,#2563eb);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:20px;font-weight:600}
.header .stats{display:flex;gap:16px;font-size:13px}
.header .stats span{background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px}
.container{max-width:1200px;margin:0 auto;padding:16px}
.toolbar{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.toolbar select,.toolbar input,.toolbar button{padding:8px 14px;border:1px solid #ddd;border-radius:6px;font-size:14px;outline:none}
.toolbar select:focus,.toolbar input:focus{border-color:#2563eb}
.toolbar input{flex:1;min-width:150px}
.toolbar button{background:#2563eb;color:#fff;border:none;cursor:pointer;font-weight:500;transition:opacity .2s}
.toolbar button:hover{opacity:.85}
.toolbar .export-btn{background:#10b981}
.toolbar .count{font-size:13px;color:#888;margin-left:auto;white-space:nowrap}
.table-wrap{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
table{width:100%;border-collapse:collapse}
th{background:#f8fafc;padding:10px 12px;text-align:left;font-size:12px;font-weight:600;color:#555;border-bottom:1px solid #eee;white-space:nowrap}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid #f0f0f0}
tr.row-new-urgent{background:#fff0f0}
tr.row-new-warning{background:#fffde7}
tr:hover{background:#f0f4ff!important}
.status-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.status-new{background:#dbeafe;color:#1d4ed8}
.status-contacted{background:#fef3c7;color:#d97706}
.status-converted{background:#d1fae5;color:#059669}
.status-lost{background:#fee2e2;color:#dc2626}
.call-btn{background:#e8f5e9;color:#2e7d32;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center}
.call-btn:hover{background:#2e7d32;color:#fff;transform:scale(1.1)}
.action-btn{padding:3px 8px;border:none;border-radius:4px;font-size:11px;cursor:pointer;transition:opacity .2s;margin-right:3px;margin-bottom:2px}
.action-btn:hover{opacity:.8}
.btn-contact{background:#fef3c7;color:#d97706}
.btn-convert{background:#d1fae5;color:#059669}
.btn-lost{background:#fee2e2;color:#dc2626}
.btn-delete{background:#fce4ec;color:#c62828}
.empty{text-align:center;padding:60px 20px;color:#aaa}
.empty .icon{font-size:48px;margin-bottom:12px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:24px;width:90%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-box h3{margin-bottom:16px;color:#1a3a6b;font-size:17px}
.modal-phone{font-size:22px;font-weight:700;color:#2563eb;text-align:center;padding:12px 0;margin-bottom:12px;background:#f0f4ff;border-radius:10px}
.modal-phone small{font-size:14px;color:#888;font-weight:400}
.result-btns{display:flex;gap:8px;margin-bottom:14px}
.result-btns button{flex:1;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;transition:all .2s}
.result-btns button.active-ok{border-color:#059669;background:#d1fae5;color:#059669}
.result-btns button.active-miss{border-color:#d97706;background:#fef3c7;color:#d97706}
.result-btns button.active-callback{border-color:#2563eb;background:#dbeafe;color:#2563eb}
.form-group{margin-bottom:12px}
.form-group label{font-size:12px;color:#888;display:block;margin-bottom:3px;font-weight:500}
.form-group input,.form-group textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;outline:none}
.form-group input:focus,.form-group textarea:focus{border-color:#2563eb}
.form-group textarea{resize:vertical;min-height:60px}
.modal-footer{display:flex;gap:8px;margin-top:16px}
.modal-footer button{flex:1;padding:10px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.modal-footer .save-btn{background:#2563eb;color:#fff}
.modal-footer .save-btn:hover{opacity:.85}
.modal-footer .cancel-btn{background:#eee;color:#555}
.modal-call-hist{margin-top:12px;border-top:1px solid #eee;padding-top:12px}
.modal-call-hist .item{display:flex;gap:8px;padding:6px 0;font-size:12px;color:#666;border-bottom:1px dashed #f0f0f0}
.modal-call-hist .item .r{font-weight:600;min-width:60px}
.modal-call-hist .item .t{color:#aaa;min-width:100px}
.toast{position:fixed;top:20px;right:20px;background:rgba(0,0,0,.8);color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:200;display:none;max-width:320px}
.toast.show{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){
.header{padding:12px 14px;flex-direction:column;align-items:flex-start}
.header .stats{gap:8px;font-size:12px}
.container{padding:10px}
th,td{padding:7px 8px;font-size:12px}
.hide-m{display:none}
.call-btn{width:28px;height:28px;font-size:14px}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📋 线索管理后台</h1>
  </div>
  <div class="stats">
    <span>📋 共 <b id="totalCount">0</b> 条</span>
    <span>🆕 新线索 <b id="newCount" style="color:#ffd54f">0</b></span>
    <span>🔴 超24h <b id="urgentCount" style="color:#ef5350">0</b></span>
    <span>📞 待回拨 <b id="callbackCount" style="color:#64b5f6">0</b></span>
  </div>
</div>

<div class="container">
  <div class="toolbar">
    <select id="statusFilter" onchange="loadLeads()">
      <option value="all">全部状态</option>
      <option value="new">🆕 新线索</option>
      <option value="contacted">📞 已联系</option>
      <option value="converted">✅ 已报名</option>
      <option value="lost">❌ 无意向</option>
    </select>
    <input type="text" id="searchInput" placeholder="搜索姓名/手机号..." oninput="debounceSearch()">
    <button onclick="loadLeads()">🔍 搜索</button>
    <button class="export-btn" onclick="exportCSV()">📥 导出</button>
    <span class="count" id="filterCount">显示 0 条</span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>姓名</th>
          <th>电话</th>
          <th class="hide-m">留言</th>
          <th class="hide-m">时间</th>
          <th>通话</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="leadTable">
        <tr class="empty"><td colspan="7"><div class="icon">📭</div><div>暂无线索数据</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="callModal">
  <div class="modal-box">
    <h3>📞 通话记录</h3>
    <div class="modal-phone" id="callPhone"><small>拨打</small><br>13800000000</div>
    <div class="result-btns">
      <button id="resOk" onclick="setResult('ok')">✅ 已接通</button>
      <button id="resMiss" onclick="setResult('miss')">❌ 无人接听</button>
      <button id="resCallback" onclick="setResult('callback')">🔄 需回拨</button>
    </div>
    <div class="form-group">
      <label>通话备注</label>
      <textarea id="callNote" placeholder="记录通话内容、客户意向..."></textarea>
    </div>
    <div class="form-group">
      <label>下次跟进时间（选填）</label>
      <input type="datetime-local" id="callFollowup">
    </div>
    <div class="modal-call-hist" id="callHistory"></div>
    <div class="modal-footer">
      <button class="cancel-btn" onclick="closeCallModal()">取消</button>
      <button class="save-btn" onclick="saveCallLog()">💾 保存通话记录</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://bmgfwpxqscdwrmqznhas.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtZ2Z3cHhxc2Nkd3JtcXpuaGFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MjAzODcsImV4cCI6MjA5NTM5NjM4N30.U6bUA8d-FYW9svXwZHAImsJVcfGM1l2GQESUTYqi4Bc';
const SB = SUPABASE_URL + '/rest/v1';
const HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };

let selectedLead = null;
let callResult = 'ok';
let searchTimer = null;

function debounceSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(loadLeads, 500); }

function fmtTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const pad = n => n.toString().padStart(2,'0');
  return d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const h = Math.floor(diff / 3600000);
  const m = Math.floor(diff / 60000);
  if (h > 48) return Math.floor(h/24)+'天前';
  if (h > 0) return h+'小时前';
  return m+'分钟前';
}

function esc(s) { return String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

async function loadLeads() {
  const status = document.getElementById('statusFilter').value;
  const keyword = document.getElementById('searchInput').value.trim();
  let url = SB + '/leads?select=*&order=created_at.desc';
  if (status !== 'all') url += '&status=eq.' + status;
  if (keyword) url += '&or=(name.ilike.*' + encodeURIComponent(keyword) + '*,phone.ilike.*' + encodeURIComponent(keyword) + '*)';
  try {
    const res = await fetch(url, { headers: HEADERS });
    const data = await res.json();
    if (!Array.isArray(data)) return;
    renderTable(data);
    updateStats(data);
  } catch {}
}

function updateStats(leads) {
  const now = Date.now();
  let n = 0, u = 0, c = 0;
  leads.forEach(l => {
    if (l.status === 'new') n++;
    if (l.status === 'new' && l.created_at && now - new Date(l.created_at).getTime() > 86400000) u++;
    if (l.status !== 'converted' && l.status !== 'lost' && l.next_followup_at && new Date(l.next_followup_at).getTime() < now + 3600000) c++;
  });
  document.getElementById('totalCount').textContent = leads.length;
  document.getElementById('newCount').textContent = n;
  document.getElementById('urgentCount').textContent = u;
  document.getElementById('callbackCount').textContent = c;
}

function renderTable(leads) {
  const tbody = document.getElementById('leadTable');
  if (!leads.length) {
    tbody.innerHTML = '<tr class="empty"><td colspan="7"><div class="icon">📭</div><div>暂无线索数据</div></td></tr>';
    return;
  }
  const statusMap = { new:'新线索', contacted:'已联系', converted:'已报名', lost:'无意向' };
  const now = Date.now();
  tbody.innerHTML = leads.map(l => {
    let cls = '';
    if (l.status === 'new' && l.created_at) {
      const age = now - new Date(l.created_at).getTime();
      if (age > 86400000) cls = 'row-new-urgent';
      else if (age > 43200000) cls = 'row-new-warning';
    }
    const lastContact = l.last_contacted_at ? timeAgo(l.last_contacted_at) : '-';
    return `<tr class="${cls}">
      <td><strong>${esc(l.name)}</strong></td>
      <td><a href="tel:${esc(l.phone)}" style="color:#2563eb;text-decoration:none">${esc(l.phone)}</a></td>
      <td class="hide-m" style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(l.note||'-')}</td>
      <td class="hide-m" style="font-size:11px;color:#888">${fmtTime(l.created_at)}</td>
      <td><button class="call-btn" onclick="openCallModal('${l.id}','${esc(l.phone)}','${esc(l.name)}')" title="拨打并记录">📞</button>${l.call_count ? '<span style="font-size:11px;color:#888;margin-left:4px">×'+l.call_count+'</span>' : ''}</td>
      <td><span class="status-badge status-${l.status}">${statusMap[l.status] || l.status}</span><br><span style="font-size:10px;color:#aaa">${lastContact}</span></td>
      <td nowrap>
        <button class="action-btn btn-contact" onclick="updateStatus('${l.id}','contacted')">📞 已联系</button>
        <button class="action-btn btn-convert" onclick="updateStatus('${l.id}','converted')">✅ 报名</button>
        <button class="action-btn btn-lost" onclick="updateStatus('${l.id}','lost')">❌ 无意向</button>
        <button class="action-btn btn-delete" onclick="deleteLead('${l.id}')">🗑</button>
      </td>
    </tr>`;
  }).join('');
}

function setResult(r) {
  callResult = r;
  ['resOk','resMiss','resCallback'].forEach(id => document.getElementById(id).className = '');
  if (r === 'ok') document.getElementById('resOk').className = 'active-ok';
  else if (r === 'miss') document.getElementById('resMiss').className = 'active-miss';
  else if (r === 'callback') document.getElementById('resCallback').className = 'active-callback';
}

async function openCallModal(id, phone, name) {
  selectedLead = { id, phone, name };
  document.getElementById('callPhone').innerHTML = `<small>拨打 ${esc(name)}</small><br>${esc(phone)}`;
  setResult('ok');
  document.getElementById('callNote').value = '';
  document.getElementById('callFollowup').value = '';
  document.getElementById('callHistory').innerHTML = '';
  document.getElementById('callModal').classList.add('show');
  try {
    const res = await fetch(SB + '/call_logs?lead_id=eq.' + id + '&select=*&order=created_at.desc&limit=10', { headers: HEADERS });
    const logs = await res.json();
    if (Array.isArray(logs) && logs.length) {
      const resultMap = { ok:'✅ 已接通', miss:'❌ 未接', callback:'🔄 需回拨', pending:'⏳ 待定' };
      document.getElementById('callHistory').innerHTML = '<div style="font-size:12px;color:#888;margin-bottom:6px">📋 历史通话记录</div>' +
        logs.map(log => `<div class="item"><span class="r">${resultMap[log.result]||log.result}</span><span>${esc(log.note||'')}</span><span class="t">${fmtTime(log.created_at)}</span></div>`).join('');
    } else {
      document.getElementById('callHistory').innerHTML = '<div style="font-size:12px;color:#aaa;text-align:center;padding:8px 0">暂无通话记录</div>';
    }
  } catch {}
}

function closeCallModal() {
  document.getElementById('callModal').classList.remove('show');
  selectedLead = null;
}

async function saveCallLog() {
  if (!selectedLead) return;
  const result = callResult;
  const note = document.getElementById('callNote').value.trim();
  const followup = document.getElementById('callFollowup').value;
  try {
    await fetch(SB + '/call_logs', {
      method: 'POST', headers: HEADERS,
      body: JSON.stringify({ lead_id: selectedLead.id, result, note, next_followup: followup ? new Date(followup).toISOString() : null })
    });
    const updates = { last_contacted_at: new Date().toISOString() };
    if (followup) updates.next_followup_at = new Date(followup).toISOString();
    await fetch(SB + '/leads?id=eq.' + selectedLead.id, {
      method: 'PATCH', headers: HEADERS,
      body: JSON.stringify(updates)
    });
    showToast('✅ 通话记录已保存');
    closeCallModal();
    loadLeads();
  } catch { showToast('❌ 保存失败，请重试'); }
}

async function updateStatus(id, status) {
  try {
    const res = await fetch(SB + '/leads?id=eq.' + id, { method: 'PATCH', headers: HEADERS, body: JSON.stringify({ status }) });
    if (res.ok) { showToast('✅ 状态已更新'); loadLeads(); }
  } catch {}
}

async function deleteLead(id) {
  if (!confirm('确认删除该线索？')) return;
  try {
    await fetch(SB + '/call_logs?lead_id=eq.' + id, { method: 'DELETE', headers: HEADERS });
    const res = await fetch(SB + '/leads?id=eq.' + id, { method: 'DELETE', headers: HEADERS });
    if (res.ok) { showToast('🗑 已删除'); loadLeads(); }
  } catch {}
}

function exportCSV() {
  const rows = document.querySelectorAll('#leadTable tr:not(.empty)');
  if (!rows.length || rows[0].querySelector('td')?.colSpan) { showToast('❌ 没有数据可导出'); return; }
  const statusMap = { new:'新线索', contacted:'已联系', converted:'已报名', lost:'无意向' };
  let csv = '\uFEFF姓名,手机号,留言,时间,通话次数,状态\n';
  rows.forEach(tr => {
    const tds = tr.querySelectorAll('td');
    if (tds.length < 7) return;
    const name = tds[0].textContent.trim();
    const phone = tds[1].textContent.trim();
    const note = (tds[2]?.textContent.trim() || '').replace(/,/g,'，');
    const time = tds[3]?.textContent.trim() || '';
    const callCount = tds[4]?.textContent.trim().replace(/[^\d]/g,'') || '0';
    const status = tds[5]?.querySelector('.status-badge')?.textContent.trim() || '';
    csv += `${name},${phone},${note},${time},${callCount},${status}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  const now = new Date();
  link.download = `消防培训线索_${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}.csv`;
  link.click();
  showToast('✅ 导出成功');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

loadLeads();
setInterval(loadLeads, 30000);
</script>
</body>
</html>
